# Render blueprint for Compass — a Dockerized Streamlit web service backed by
# a managed Postgres. Render (unlike Streamlit Community Cloud, which was the
# unresolved-failure host in cloud-archive/) gives real logs + a shell, which
# is why the plan picks it. Deploy: push this repo to GitHub, then in Render →
# "New +" → "Blueprint" and point it at the repo.
services:
  - type: web
    name: compass
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # free tier sleeps; starter stays warm
    healthCheckPath: /_stcore/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: compass-db
          property: connectionString
      - key: PARENT_PASSCODE
        sync: false        # set this in the Render dashboard, not in git

databases:
  - name: compass-db
    plan: basic-256mb
